@if( !models() ){
    loading...
}
@else{
    Models<button mat-icon-button [routerLink]="['/model/new']"><mat-icon>add</mat-icon></button> 
    <mat-list>
    @for( m of models(); track m.id){
        <mat-list-item>
            <button [routerLink]="['/model',m.id]" mat-button>{{m.label}}</button> <span class="debug">{{m.id}}</span>
        </mat-list-item>
    }
</mat-list>
}
