
<input type="text"
        placeholder="Pick one"
        aria-label="Number"
        matInput
        [formControl]="myControl"
        [matAutocomplete]="auto">
<mat-autocomplete #auto="matAutocomplete" [displayWith]="displayFn" (optionSelected)='onOptionSelect($event.option.value)'>
  <mat-option *ngFor="let option of filteredOptions | async" [value]="option" >
    {{option}}
  </mat-option>
</mat-autocomplete>
