<div class="bar">
  <b>Adding expression</b>
  <span class="spacer"></span>
  <button mat-button mat-dialog-close>Cancel</button> 
  <button [disabled]="!FG.valid" mat-button [mat-dialog-close]="data" cdkFocusInitial (click)="onSubmit()">Ok</button>
</div>
<div [formGroup]="FG">
  <mat-form-field>
      <mat-label>Column Name</mat-label>
      <input matInput formControlName="columnName">
  </mat-form-field>
  <p>
  <mat-form-field appearance="fill">
    <mat-label>expression</mat-label> 
    <textarea matInput maxlength="10000" rows="10" formControlName="expression"></textarea>
  </mat-form-field> 
  </p>
