<div class="header">
    <span>Model Edit</span>
    @if( model ){
        <span class="spacer"></span>
        <span >{{id}}</span>
        <button  mat-button (click)="onDelete()"><mat-icon>delete</mat-icon></button>
    }
</div>

<div [formGroup]="FG">
    <p>
        <mat-form-field class="name" appearance="fill">
            <mat-label>Name</mat-label>
            <input matInput formControlName="label" (change)="firebaseService.onChange($event,'Model',id,'label')">
        </mat-form-field>
    <p>
        <mat-tree [dataSource]="dataSource" [treeControl]="treeControl" class="example-tree">
            <!-- This is the tree node template for leaf nodes -->
            <!-- There is inline padding applied to this node using styles.
              This padding value depends on the mat-icon-button width. -->
            <mat-tree-node *matTreeNodeDef="let node">
              <span class="criteria">{{node.item.criteria }}</span> <span class="table">{{node.item.name}}</span>
              @if( !isAdding ){
                <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="menu">
                  <mat-icon>more_vert</mat-icon>
                </button>
                <mat-menu #menu="matMenu">
                  <button mat-icon-button (click)="Edit(node.item)"><mat-icon>edit</mat-icon></button>
                  <button mat-icon-button (click)="Add(node.item)"><mat-icon>add</mat-icon></button>
                  <button mat-icon-button (click)="deleteNode(node.parentTreeNode?.item, node.item)"><mat-icon>delete</mat-icon></button>
                </mat-menu>
              }              
            </mat-tree-node>

            <mat-tree-node *matTreeNodeDef="let node; when: isNew">
              <div [formGroup]="newJoinFG">
                <mat-form-field class="criteria" appearance="fill">
                  <mat-label>criteria</mat-label> 
                  <textarea class="sql" matInput maxlength="10000" rows="10" formControlName="criteria"></textarea>
                </mat-form-field>                  
                <mat-form-field class="name" appearance="fill">
                    <mat-label>Name</mat-label>
                    <input matInput formControlName="table">
                </mat-form-field>
                <button mat-icon-button (click)="AddSubmit(node.item)"><mat-icon>check</mat-icon></button>
              </div>                      
            </mat-tree-node>  
            <mat-tree-node *matTreeNodeDef="let node; when: isEditing">
              <div [formGroup]="newJoinFG">
                <mat-form-field class="criteria" appearance="fill">
                  <mat-label>criteria</mat-label> 
                  <textarea class="sql" matInput maxlength="10000" rows="10" formControlName="criteria"></textarea>
                </mat-form-field>                  
                <mat-form-field class="name" appearance="fill">
                    <mat-label>Name</mat-label>
                    <input matInput formControlName="table">
                </mat-form-field>
                <button mat-icon-button (click)="EditSubmit(node.item)"><mat-icon>check</mat-icon></button>
              </div>                      
            </mat-tree-node>              
            <!-- This is the tree node template for expandable nodes -->
            <mat-nested-tree-node
                *matTreeNodeDef="let node; when: hasChild"
                >
              <div class="mat-tree-node">
                <button mat-icon-button matTreeNodeToggle
                        [attr.aria-label]="'Toggle ' + node.name">
                  <mat-icon class="mat-icon-rtl-mirror">
                    {{treeControl.isExpanded(node) ? 'expand_more' : 'chevron_right'}}
                  </mat-icon>
                </button>
                {{node.item.criteria }} {{node.item.name}}
                @if( !isAdding ){
                  <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="menu">
                    <mat-icon>more_vert</mat-icon>
                  </button>
                  <mat-menu #menu="matMenu">
                    <button mat-icon-button (click)="Edit(node.item)"><mat-icon>edit</mat-icon></button>
                    <button mat-icon-button (click)="Add(node.item)"><mat-icon>add</mat-icon></button>
                    <button mat-icon-button (click)="deleteNode(node.parentTreeNode?.item, node.item)"><mat-icon>delete</mat-icon></button>
                  </mat-menu>
                }                    
              </div>
              <mat-tree-node *matTreeNodeDef="let node; when: isEditing">
                <div [formGroup]="newJoinFG">
                  <mat-form-field class="criteria" appearance="fill">
                    <mat-label>criteria</mat-label> 
                    <textarea class="sql" matInput maxlength="10000" rows="10" formControlName="criteria"></textarea>
                  </mat-form-field>                  
                  <mat-form-field class="name" appearance="fill">
                      <mat-label>Name</mat-label>
                      <input matInput formControlName="table">
                  </mat-form-field>
                  <button mat-icon-button (click)="EditSubmit(node.item)"><mat-icon>check</mat-icon></button>
                </div>                      
              </mat-tree-node> 

              <!-- There is inline padding applied to this div using styles.
                  This padding value depends on the mat-icon-button width.  -->
              <div [class.example-tree-invisible]="!treeControl.isExpanded(node)"
                  role="group">
                <ng-container matTreeNodeOutlet></ng-container>
              </div>
              @if( treeControl.isExpanded(node) && !isAdding ){
                <div role="group">
                <button mat-icon-button   (click)="Add(node.item)"><mat-icon>create_new_folder</mat-icon></button>
                </div>
              }  
            </mat-nested-tree-node>
          </mat-tree>
          @if( !isAdding ){
            <button mat-icon-button (click)="Add(null)"><mat-icon>create_new_folder</mat-icon></button>
          }          
    
    @if(!model){
        <button mat-raised-button (click)="onCancel()">Cancelar</button>     
        <button mat-raised-button color="primary" [disabled]="!FG.valid" (click)="onSubmit()">Submit</button>
    }
</div>
