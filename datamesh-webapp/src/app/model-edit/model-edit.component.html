<div class="flexcontainer">
  <as-split direction="horizontal">
    <as-split-area [size]="40">
      <p>LEFT</p>
    </as-split-area>
    <as-split-area [size]="60">
      <div style="width: 100%; height: 100%; background: green;">
        <as-split direction="vertical">
          <as-split-area style="max-height:40%" [size]="40">      
            <p>TOP</p>
          </as-split-area>
          <as-split-area style="max-height:40%" [size]="60">
            <p>BUTTON</p>
          </as-split-area>
        </as-split>
      </div>
    </as-split-area>
  </as-split>
</div>
