
<div class="heather">
    <span>Reports</span>
    <button matFab  (click)="onNew()">
        <mat-icon>add</mat-icon>
    </button>
</div>


<div class="searchFG" [formGroup]="searchFG">
    <mat-form-field appearance="fill">
        <mat-label>search</mat-label>
        <input matInput formControlName="term" (change)="onSearch()">
        <mat-icon matPrefix>search</mat-icon>
    </mat-form-field>
    <button mat-icon-button (click)="onCancelSearch()"><mat-icon>close</mat-icon></button>
</div>  
@if( !list() ){
    loading...
}
@else{
    <div class="list">
    @for( j of list(); track j.id){
        @if( renamedId() == j.id){
            <div [formGroup]="FG">
                <mat-form-field appearance="fill">
                    <mat-label>Name</mat-label>
                    <input matInput formControlName="label" required >
                </mat-form-field>
                <button mat-icon-button (click)="onCancelEdit()"><mat-icon>close</mat-icon></button>
                <button mat-icon-button [disabled]="!FG.controls.label.dirty" (click)="onUpdate()"><mat-icon>done</mat-icon></button>
            </div>  
            
        }
        @else{
        <div class="bar">
            <span><h2 (click)="onRenameClick(j.id, j.label)">{{j.label}}</h2></span>
            <!--<span class="debug">{{j.id}}</span> -->   
            <button mat-icon-button (click)="onDelete(j.id, j.label)" ><mat-icon>delete</mat-icon></button>
        </div>
        }
        <button mat-icon-button [disabled]="!!renamedId()" [routerLink]="[collection,j.id,'ReportDoc','new' ]"><mat-icon>add</mat-icon></button>
        <div>
            childs go here
            <!--<sqljupiterdoc-list groupId={{j.id}}></sqljupiterdoc-list> -->
        </div>
           
    }
    @empty {
        <li>There are no items click the add button in the upper corner.</li>
    }
    </div>
}
